<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nix lib &amp; builtins reference</title>
<link rel="stylesheet" href="assets/skylighting-solarized-theme.css">
<script src="assets/htmx.min.js" defer></script>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #555;
    --bg: #fafafa;
    --side-bg: #f0f2f5;
    --side-border: #d0d4d9;
    --accent: #06c;
    --accent-bg: #e6f0fb;
    --code-bg: #f3f3f3;
    --code-border: #e2e2e2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, sans-serif;
    color: var(--fg);
    background: var(--bg);
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  /* ---------- sidebar ---------- */
  nav.sidebar {
    background: var(--side-bg);
    border-right: 1px solid var(--side-border);
    padding: 1rem .75rem;
    position: sticky; top: 0;
    height: 100vh; overflow-y: auto;
    font-size: 13px;
  }
  nav.sidebar h1 {
    font-size: .82rem; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); margin: 0 .25rem .75rem;
  }
  nav.sidebar details { margin: 0 0 .15rem; }
  nav.sidebar summary {
    list-style: none; cursor: pointer;
    padding: .25rem .5rem; border-radius: 4px;
    display: flex; align-items: center; gap: .35rem;
    user-select: none;
  }
  nav.sidebar summary::-webkit-details-marker { display: none; }
  nav.sidebar summary::before {
    content: "▸"; color: var(--muted); font-size: .7em;
    transition: transform .12s;
    width: .8em; display: inline-block;
  }
  nav.sidebar details[open] > summary::before { transform: rotate(90deg); }
  nav.sidebar details:not(:has(ul)) > summary::before { visibility: hidden; }
  nav.sidebar summary a {
    flex: 1; color: var(--fg); text-decoration: none;
    font-weight: 500;
  }
  nav.sidebar summary:hover { background: rgba(0,0,0,.04); }
  nav.sidebar ul {
    list-style: none; padding: 0 0 .25rem 1.5rem; margin: 0;
    border-left: 1px solid var(--side-border);
    margin-left: .85rem;
  }
  nav.sidebar li { margin: 0; }
  nav.sidebar li a {
    display: block; padding: .15rem .5rem; border-radius: 3px;
    color: var(--accent); text-decoration: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
  }
  nav.sidebar li a:hover { background: rgba(0,0,0,.04); }
  nav.sidebar a.active,
  nav.sidebar summary:has(a.active) {
    background: var(--accent-bg); color: var(--accent);
  }
  /* ---------- main ---------- */
  main {
    padding: 2rem 2.5rem;
    max-width: 920px;
    width: 100%;
  }
  main h1 {
    font-size: 1.7rem; margin: 0 0 1rem; padding-bottom: .35rem;
    border-bottom: 1px solid var(--side-border);
  }
  main h2 {
    font-size: 1.15rem; margin: 1.8rem 0 .5rem;
    padding: .25rem 0; scroll-margin-top: 1rem;
  }
  main h2 code { font-size: 1em; background: none; padding: 0; border: 0; }
  main h3 { font-size: 1rem; color: var(--muted); margin: 1.2rem 0 .35rem; }
  main p, main li { line-height: 1.6; }
  main code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: .88em;
    background: var(--code-bg); border: 1px solid var(--code-border);
    border-radius: 3px; padding: .05em .3em;
  }
  main pre {
    background: var(--code-bg); border: 1px solid var(--code-border);
    border-radius: 5px; padding: .75rem 1rem; overflow-x: auto;
  }
  main pre code { background: none; border: 0; padding: 0; font-size: .85em; }
  main dl { margin: .5rem 0 1rem; }
  main dt { font-weight: 600; margin-top: .5rem; }
  main dd { margin: .15rem 0 0 1.5rem; }
  main blockquote {
    border-left: 3px solid var(--side-border);
    margin: 1rem 0; padding: .25rem 1rem;
    color: var(--muted);
  }
  main a { color: var(--accent); }
  /* tiny anchored target highlight */
  main :target {
    background: #fff4c2;
    transition: background 1.5s ease-out;
  }
  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    nav.sidebar { position: static; height: auto; max-height: 50vh; }
    main { padding: 1rem 1.2rem; }
  }
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <h1>Nix reference</h1>
    <div id="nav">
      <!-- NAV -->
    </div>
  </nav>
  <main id="content" hx-get="fragments/intro.html" hx-trigger="load once"></main>
</div>
<script>
  // 1. Restore deep-link on initial load: URL `/foo` -> click matching summary link.
  // 2. Scroll into the in-fragment anchor after htmx swap completes.
  // 3. Toggle active highlight on nav links.
  (function () {
    const main = () => document.getElementById('content');

    function clearActive() {
      document.querySelectorAll('nav.sidebar a.active').forEach(a => a.classList.remove('active'));
    }

    function scrollToAnchor(id) {
      if (!id) return;
      // wait for layout
      requestAnimationFrame(() => {
        // The id may contain a dot (e.g. builtins.add-e1-e2) which is valid for getElementById.
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ block: 'start', behavior: 'smooth' });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Active highlighting + scroll-to-anchor after every swap.
      document.body.addEventListener('htmx:afterSwap', (e) => {
        const trigger = e.detail.requestConfig && e.detail.requestConfig.elt;
        if (trigger && trigger.matches('nav.sidebar a')) {
          clearActive();
          trigger.classList.add('active');
          // Expand parent <details> if collapsed.
          const det = trigger.closest('details');
          if (det && !det.open) det.open = true;
          const anchor = trigger.dataset.anchor;
          if (anchor) scrollToAnchor(anchor);
          else main().scrollTo(0, 0);
        }
      });

      // Deep-link restore from URL: /path#anchor or /path.
      const slug = location.pathname.replace(/^.*\//, '').replace(/\.html$/, '');
      const anchor = location.hash.replace(/^#/, '');
      if (slug) {
        const link = document.querySelector(`nav.sidebar a[data-path="${slug}"][data-anchor="${anchor}"]`)
                  || document.querySelector(`nav.sidebar a[data-path="${slug}"]:not([data-anchor])`)
                  || document.querySelector(`nav.sidebar a[data-path="${slug}"]`);
        if (link) {
          const m = main();
          m.removeAttribute('hx-trigger');
          m.removeAttribute('hx-get');
          // Trigger the link to load its fragment.
          htmx.trigger(link, 'click');
        }
      }
    });
  })();
</script>
</body>
</html>

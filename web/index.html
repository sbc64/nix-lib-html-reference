<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nix lib &amp; builtins reference</title>
<link rel="stylesheet" href="assets/skylighting-solarized-theme.css">
<script src="assets/htmx.min.js"></script>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #555;
    --bg: #fafafa;
    --side-bg: #f0f2f5;
    --side-border: #d0d4d9;
    --accent: #06c;
    --accent-bg: #e6f0fb;
    --code-bg: #f3f3f3;
    --code-border: #e2e2e2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, sans-serif;
    color: var(--fg);
    background: var(--bg);
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  /* ---------- sidebar ---------- */
  nav.sidebar {
    background: var(--side-bg);
    border-right: 1px solid var(--side-border);
    padding: 1rem .75rem;
    position: sticky; top: 0;
    height: 100vh; overflow-y: auto;
    font-size: 13px;
  }
  nav.sidebar h1 {
    font-size: .82rem; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); margin: 0 .25rem .75rem;
  }
  nav.sidebar .nav-top {
    display: block; padding: .3rem .65rem; margin: 0 0 .35rem;
    color: var(--fg); text-decoration: none; font-weight: 500;
    border-radius: 4px;
  }
  nav.sidebar .nav-top:hover,
  nav.sidebar .nav-top.active { background: var(--accent-bg); color: var(--accent); }

  nav.sidebar details { margin: 0; }
  nav.sidebar summary {
    list-style: none; cursor: pointer; user-select: none;
    padding: .3rem .65rem; border-radius: 4px;
    color: var(--fg); font-weight: 500;
    display: flex; align-items: center; gap: .4rem;
  }
  nav.sidebar summary::-webkit-details-marker { display: none; }
  nav.sidebar summary::before {
    content: "▸"; color: var(--muted); font-size: .65em;
    transition: transform .12s;
    width: .8em; display: inline-block; text-align: center;
  }
  nav.sidebar details[open] > summary::before { transform: rotate(90deg); }
  nav.sidebar summary:hover { background: rgba(0,0,0,.05); }

  nav.sidebar ul {
    list-style: none; padding: 0 0 .35rem 1.3rem; margin: 0;
    border-left: 1px solid var(--side-border);
    margin-left: .9rem;
  }
  nav.sidebar li { margin: 0; }
  nav.sidebar li a {
    display: block; padding: .15rem .55rem; border-radius: 3px;
    color: var(--accent); text-decoration: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  nav.sidebar li a:hover { background: rgba(0,0,0,.05); }
  nav.sidebar a.active { background: var(--accent-bg); }
  nav.sidebar .nav-overview { font-style: italic; opacity: .85; }

  /* ---------- main ---------- */
  main {
    padding: 2rem 2.5rem;
    max-width: 920px;
    width: 100%;
  }
  main h1 {
    font-size: 1.7rem; margin: 0 0 1rem; padding-bottom: .35rem;
    border-bottom: 1px solid var(--side-border);
  }
  main h2 {
    font-size: 1.15rem; margin: 1.8rem 0 .5rem;
    padding: .25rem 0; scroll-margin-top: 1rem;
  }
  main h2 code { font-size: 1em; background: none; padding: 0; border: 0; }
  main h3 { font-size: 1rem; color: var(--muted); margin: 1.2rem 0 .35rem; }
  main p, main li { line-height: 1.6; }
  main code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: .88em;
    background: var(--code-bg); border: 1px solid var(--code-border);
    border-radius: 3px; padding: .05em .3em;
  }
  main pre {
    background: var(--code-bg); border: 1px solid var(--code-border);
    border-radius: 5px; padding: .75rem 1rem; overflow-x: auto;
  }
  main pre code { background: none; border: 0; padding: 0; font-size: .85em; }
  main dl { margin: .5rem 0 1rem; }
  main dt { font-weight: 600; margin-top: .5rem; }
  main dd { margin: .15rem 0 0 1.5rem; }
  main blockquote {
    border-left: 3px solid var(--side-border);
    margin: 1rem 0; padding: .25rem 1rem;
    color: var(--muted);
  }
  main a { color: var(--accent); }
  main :target { background: #fff4c2; transition: background 1.5s ease-out; }
  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    nav.sidebar { position: static; height: auto; max-height: 50vh; }
    main { padding: 1rem 1.2rem; }
  }
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <h1>Nix reference</h1>
    <div id="nav">
      <!-- NAV -->
    </div>
  </nav>
  <main id="content"><p>Loading…</p></main>
</div>
<script>
  (function () {
    const sidebar = document.querySelector('nav.sidebar');
    const main    = document.getElementById('content');

    function clearActive() {
      sidebar.querySelectorAll('a.active').forEach(a => a.classList.remove('active'));
    }

    function activate(link, anchorId) {
      clearActive();
      link.classList.add('active');
      const det = link.closest('details');
      if (det && !det.open) det.open = true;
      link.scrollIntoView({ block: 'nearest' });
      if (anchorId) {
        requestAnimationFrame(() => {
          const el = document.getElementById(anchorId);
          if (el) el.scrollIntoView({ block: 'start', behavior: 'smooth' });
          else window.scrollTo(0, 0);
        });
      } else {
        window.scrollTo(0, 0);
      }
    }

    document.body.addEventListener('htmx:afterSwap', (evt) => {
      const trig = evt.detail.requestConfig && evt.detail.requestConfig.elt;
      if (!trig || !sidebar.contains(trig)) return;
      activate(trig, trig.dataset.anchor);
    });

    document.body.addEventListener('htmx:responseError', (evt) => {
      main.innerHTML = '<p><strong>Request failed:</strong> ' +
        evt.detail.pathInfo.requestPath + ' returned ' +
        evt.detail.xhr.status + '</p>';
    });
    document.body.addEventListener('htmx:sendError', () => {
      main.innerHTML = '<p><strong>Network error.</strong></p>';
    });

    // Load intro on first paint.
    function loadIntro() {
      const introLink = sidebar.querySelector('a.nav-top[data-path="intro"]');
      if (introLink) htmx.trigger(introLink, 'click');
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadIntro);
    } else {
      loadIntro();
    }
  })();
</script>
</body>
</html>
